<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="/static/styles.css" />
</head>

<body>

<h1>Tic Tac Toe</h1>

<div class="scoreboard">
    <p>X Wins: <span id="scoreX">0</span></p>
    <p>O Wins: <span id="scoreO">0</span></p>
    <p>Draws: <span id="scoreD">0</span></p>
</div>

<div class="board">
    <div class="cell" onclick="makeMove(0)"></div>
    <div class="cell" onclick="makeMove(1)"></div>
    <div class="cell" onclick="makeMove(2)"></div>
    <div class="cell" onclick="makeMove(3)"></div>
    <div class="cell" onclick="makeMove(4)"></div>
    <div class="cell" onclick="makeMove(5)"></div>
    <div class="cell" onclick="makeMove(6)"></div>
    <div class="cell" onclick="makeMove(7)"></div>
    <div class="cell" onclick="makeMove(8)"></div>
</div>

<p id="aiStatus">AI Mode: OFF</p>

<h2 id="status"></h2>
<p id="notice" aria-live="polite"></p>

<div class="actions">
    <button onclick="resetGame()">Reset Game</button>

    <div class="ai-controls">
        <button id="aiToggleBtn" onclick="toggleAI()">Enable AI</button>
        <div class="ai-settings">
            <div id="aiLevelWrap" class="ai-select-wrap" style="display: none;">
                <span class="ai-select-label">AI Opponent</span>
                <div class="select-shell">
                    <select id="aiLevel" onchange="setAiLevel()">
                        <option value="easy">Easy</option>
                        <option value="medium">Medium</option>
                        <option value="hard" selected>Hard</option>
                    </select>
                </div>
            </div>

            <div id="playerMarkWrap" class="ai-select-wrap" style="display: none;">
                <span class="ai-select-label">Play As</span>
                <div class="select-shell">
                    <select id="playerMark" onchange="setPlayerMark()">
                        <option value="X" selected>X (First)</option>
                        <option value="O">O (Second)</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/static/script.js"></script>

</body>
</html>
